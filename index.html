<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker // Hábitos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void:        #050a06;
    --bg-deep:        #070d08;
    --bg-panel:       rgba(10, 18, 11, 0.88);
    --bg-card:        rgba(11, 20, 12, 0.92);

    --green-primary:  #00e676;
    --green-dim:      #10b981;
    --green-ghost:    rgba(0, 230, 118, 0.06);
    --green-border:   rgba(0, 230, 118, 0.16);
    --green-glow:     rgba(0, 230, 118, 0.30);

    --w1-bg: rgba(255,255,255,0.06);
    --w1-border: rgba(255,255,255,0.12);
    --w2-bg: rgba(236,72,153,0.10);
    --w2-border: rgba(236,72,153,0.25);
    --w3-bg: rgba(6,182,212,0.10);
    --w3-border: rgba(6,182,212,0.25);
    --w4-bg: rgba(59,130,246,0.12);
    --w4-border: rgba(59,130,246,0.28);
    --w5-bg: rgba(251,146,60,0.10);
    --w5-border: rgba(251,146,60,0.25);

    --w1-text: rgba(255,255,255,0.55);
    --w2-text: #f9a8d4;
    --w3-text: #67e8f9;
    --w4-text: #93c5fd;
    --w5-text: #fdba74;

    --today-bg:    rgba(0,230,118,0.13);
    --today-border: rgba(0,230,118,0.5);

    --accent-red:    #ff4757;
    --accent-amber:  #ffa502;
    --accent-blue:   #1e90ff;
    --accent-purple: #7B61FF;

    --text-bright: #e8f5e9;
    --text-body:   rgba(200,230,200,0.75);
    --text-muted:  rgba(150,200,150,0.45);
    --text-dim:    rgba(100,150,100,0.28);

    --border-subtle: rgba(0,230,118,0.07);
    --border-card:   rgba(0,230,118,0.13);

    --card-radius: 9px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);

    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--green-border); border-radius: 2px; }

  #matrix-bg {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0; opacity: 0.10;
    pointer-events: none;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-void);
    color: var(--text-body);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: rgba(5,10,6,0.94);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center;
    padding: 0 28px; z-index: 100;
    backdrop-filter: blur(20px);
    gap: 0;
  }
  .topbar-brand {
    display: flex; align-items: baseline; gap: 8px;
    padding-right: 24px;
    border-right: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .brand-tag  { font-family: var(--font-mono); font-size: 0.62rem; color: var(--green-dim); letter-spacing: 0.12em; }
  .brand-name { font-family: var(--font-mono); font-size: 0.98rem; font-weight: 700; color: var(--text-bright); letter-spacing: 0.04em; }

  .back-btn {
    font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 6px 10px;
    border-radius: 4px; transition: var(--transition); margin-right: 12px;
  }
  .back-btn:hover { color: var(--green-primary); background: var(--green-ghost); }

  .month-list {
    list-style: none; display: flex;
    overflow-x: auto; scrollbar-width: none;
    margin: 0 0 0 16px; padding: 0; flex: 1;
    gap: 2px;
  }
  .month-list::-webkit-scrollbar { display: none; }
  .month-list li {
    font-family: var(--font-mono); font-size: 0.68rem;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 8px 14px; cursor: pointer; white-space: nowrap;
    border-radius: 5px; color: var(--text-muted);
    transition: var(--transition); position: relative;
    border-bottom: 2px solid transparent;
  }
  .month-list li:hover { color: var(--text-body); background: var(--green-ghost); }
  .month-list li.active {
    color: var(--green-primary);
    background: var(--green-ghost);
    border-bottom-color: var(--green-primary);
  }
  .month-list li .m-pct {
    font-size: 0.55rem; color: var(--green-dim);
    margin-left: 4px; opacity: 0.8;
  }
  .month-list li.active .m-pct { color: var(--green-primary); opacity: 1; }

  .topbar-right {
    display: flex; align-items: center; gap: 10px;
    padding-left: 16px; border-left: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .status-dot { display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.08em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-primary); box-shadow: 0 0 8px var(--green-glow); animation: pulse-dot 2.2s infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .main-content {
    flex: 1; padding: 76px 32px 0 32px;
    position: relative; z-index: 1;
  }

  .section-header { margin-bottom: 24px; }
  .section-eyebrow { font-family: var(--font-mono); font-size: 0.62rem; color: var(--green-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 5px; }
  .section-title   { font-size: 1.65rem; font-weight: 600; color: var(--text-bright); letter-spacing: -0.02em; }

  .dashboard-wrapper { width: max-content; max-width: 100%; display: flex; flex-direction: column; }

  .table-scroll { overflow-x: auto; }
  table {
    border-collapse: collapse;
    width: max-content;
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--card-radius);
    overflow: hidden;
  }
  th, td {
    border: 1px solid rgba(0,230,118,0.06);
    padding: 6px 5px; text-align: center;
    min-width: 30px;
    font-family: var(--font-mono); font-size: 0.75rem;
  }

  .title-row {
    background: rgba(0,230,118,0.05);
    font-family: var(--font-mono); font-size: 0.7rem;
    font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--green-dim);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-card);
  }

  .weeks-row th { font-family: var(--font-mono); font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; padding: 8px 4px; }
  .w1-h { background: var(--w1-bg); color: var(--w1-text); border-bottom: 1px solid var(--w1-border); }
  .w2-h { background: var(--w2-bg); color: var(--w2-text); border-bottom: 1px solid var(--w2-border); }
  .w3-h { background: var(--w3-bg); color: var(--w3-text); border-bottom: 1px solid var(--w3-border); }
  .w4-h { background: var(--w4-bg); color: var(--w4-text); border-bottom: 1px solid var(--w4-border); }
  .w5-h { background: var(--w5-bg); color: var(--w5-text); border-bottom: 1px solid var(--w5-border); }

  .dates-row th { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); padding: 5px 4px; }
  .w1 { background: var(--w1-bg); }
  .w2 { background: var(--w2-bg); }
  .w3 { background: var(--w3-bg); }
  .w4 { background: var(--w4-bg); }
  .w5 { background: var(--w5-bg); }

  th.today-col, td.today-col {
    background: var(--today-bg) !important;
    box-shadow: inset 0 0 0 1px var(--today-border);
    position: relative;
  }
  th.today-col { color: var(--green-primary) !important; }

  .habit-col {
    min-width: 52px; font-size: 1.25em;
    background: rgba(0,230,118,0.03);
    cursor: help; padding: 6px 8px;
  }
  .habit-col[contenteditable="true"] { cursor: text; }
  .habit-col:focus { outline: 1px solid var(--green-border); background: var(--green-ghost); }

  .streak-col {
    min-width: 52px; font-family: var(--font-mono); font-size: 0.7rem;
    background: rgba(0,230,118,0.03); color: var(--green-dim);
    font-weight: 600;
  }
  .streak-val { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .streak-num { font-size: 0.9rem; color: var(--green-primary); line-height: 1; }
  .streak-label { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

  .done-col {
    min-width: 46px; font-family: var(--font-mono); font-size: 0.7rem;
    background: rgba(0,230,118,0.03); color: var(--text-muted);
  }
  .done-val { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .done-num { font-size: 0.85rem; color: var(--text-body); line-height: 1; }
  .done-lbl { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

  .goal-col {
    min-width: 50px; font-family: var(--font-mono); font-size: 0.8rem;
    font-weight: 600; color: var(--accent-amber);
    cursor: text; background: rgba(0,230,118,0.02);
  }
  .goal-col:focus { outline: 1px solid var(--accent-amber); background: rgba(255,165,2,0.06); }

  tbody td { transition: background var(--transition); }
  tbody tr:hover td { background: rgba(0,230,118,0.025); }
  td input[type="checkbox"] {
    width: 15px; height: 15px;
    cursor: pointer; margin: 0;
    accent-color: var(--green-primary);
  }

  .header-habit { background: rgba(0,230,118,0.04); font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .header-streak { background: rgba(0,230,118,0.04); font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .header-done   { background: rgba(0,230,118,0.04); font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .header-goal   { background: rgba(0,230,118,0.04); font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.1em; }

  .charts-container {
    display: flex; gap: 14px;
    margin-top: 18px;
    width: 100%; height: 280px;
    padding-bottom: 24px;
    box-sizing: border-box;
  }
  .chart-box {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: var(--card-radius);
    padding: 16px 18px;
    height: 100%; box-sizing: border-box;
    transition: var(--transition);
    display: flex; flex-direction: column;
  }
  .chart-box:hover { border-color: var(--green-border); }
  .chart-header { display: flex; align-items: baseline; gap: 7px; margin-bottom: 12px; flex-shrink: 0; }
  .chart-tag   { font-family: var(--font-mono); font-size: 0.58rem; color: var(--green-dim); letter-spacing: 0.12em; }
  .chart-title { font-size: 0.78rem; font-weight: 500; color: var(--text-body); }
  .chart-inner { flex: 1; position: relative; min-height: 0; }

  .doughnut-box { flex: 1; min-width: 200px; }
  .line-box     { flex: 2.2; min-width: 340px; }
  .bar-box      { flex: 1.5; min-width: 240px; }

  .sync-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 32px;
    border-top: 1px solid var(--border-subtle);
    background: rgba(5,10,6,0.65);
    position: sticky; bottom: 0; z-index: 10;
    backdrop-filter: blur(12px);
    margin-top: auto;
  }
  .btn-action {
    font-family: var(--font-mono); font-size: 0.67rem;
    background: var(--green-ghost);
    color: var(--text-muted); border: 1px solid var(--green-border);
    padding: 7px 14px; border-radius: 5px; cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase;
    transition: var(--transition);
  }
  .btn-action:hover { color: var(--green-primary); border-color: var(--green-dim); }
  .sync-status { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim); margin-left: auto; letter-spacing: 0.08em; }

  .modal-overlay {
    display: none; position: fixed;
    inset: 0; background: rgba(0,0,0,0.88);
    z-index: 1000; justify-content: center; align-items: center;
    backdrop-filter: blur(8px);
  }
  .modal-content {
    background: #070e08; border: 1px solid var(--green-border);
    border-radius: 11px; padding: 26px; width: 90%; max-width: 520px;
    box-shadow: 0 0 50px rgba(0,230,118,0.07);
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal-title { font-family: var(--font-mono); font-size: 0.7rem; color: var(--green-dim); letter-spacing: 0.12em; }
  .modal-content p  { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
  .modal-content ol { font-size: 0.8rem; color: var(--text-muted); padding-left: 18px; line-height: 1.8; }
  .modal-content ol b { color: var(--text-body); }
  textarea#exportTextarea {
    width: 100%; height: 160px;
    background: #020504; color: #00e676;
    padding: 12px; font-family: var(--font-mono); font-size: 0.72rem;
    border: 1px solid var(--border-subtle); border-radius: 5px;
    resize: none; outline: none; line-height: 1.6;
  }
  .modal-buttons { display: flex; justify-content: center; gap: 12px; }
  .btn-modal {
    padding: 9px 24px; border: none; border-radius: 5px; cursor: pointer;
    font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; transition: var(--transition);
  }
  .btn-modal-close { background: var(--green-ghost); color: var(--text-body); border: 1px solid var(--green-border); }
  .btn-modal-close:hover { color: var(--green-primary); border-color: var(--green-dim); }

  @keyframes fadeSection { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  .fade-in { animation: fadeSection 0.28s ease; }
</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="modal-overlay" id="exportModal">
  <div class="modal-content">
    <div class="modal-title">// export · backup_json</div>
    <p>Copie o JSON abaixo para guardar um backup local:</p>
    <textarea id="exportTextarea" readonly></textarea>
    <div class="modal-buttons">
      <button class="btn-modal btn-modal-close" onclick="fecharModalExport()">fechar</button>
    </div>
  </div>
</div>

<nav class="topbar">
  <button class="back-btn" onclick="window.history.back()">← central</button>
  <div class="topbar-brand">
    <span class="brand-tag">// hábitos</span>
    <span class="brand-name">Tracker</span>
  </div>
  <ul class="month-list" id="monthMenu"></ul>
  <div class="topbar-right">
    <div class="status-dot">
      <span class="dot"></span>
      <span id="syncStatus">conectando...</span>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="section-header">
    <div class="section-eyebrow">// monitoramento</div>
    <h1 class="section-title" id="pageTitle">Janeiro</h1>
  </div>

  <div class="dashboard-wrapper fade-in" id="dashWrapper">
    <div class="table-scroll">
      <table id="trackerTable">
        <thead>
          <tr>
            <th colspan="36" class="title-row" id="tableTitle">// janeiro · 2026</th>
          </tr>
          <tr class="weeks-row" id="weeksRow"></tr>
          <tr class="dates-row" id="datesRow"></tr>
        </thead>
        <tbody id="habitBody"></tbody>
      </table>
    </div>

    <div class="charts-container">
      <div class="chart-box doughnut-box">
        <div class="chart-header"><span class="chart-tag">//</span><span class="chart-title">Distribuição</span></div>
        <div class="chart-inner"><canvas id="doughnutChart"></canvas></div>
      </div>
      <div class="chart-box line-box">
        <div class="chart-header"><span class="chart-tag">//</span><span class="chart-title">Desempenho Diário</span></div>
        <div class="chart-inner"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="chart-box bar-box">
        <div class="chart-header"><span class="chart-tag">//</span><span class="chart-title">Progresso das Metas</span></div>
        <div class="chart-inner"><canvas id="barChart"></canvas></div>
      </div>
    </div>
  </div>
</main>

<div class="sync-bar">
  <button class="btn-action" onclick="abrirModalExportacao()">exportar json</button>
  <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importData(event)">
  <button class="btn-action" onclick="document.getElementById('fileInput').click()">carregar backup</button>
</div>

<script>
/* ── MATRIX RAIN ── */
(function() {
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  let cols, drops;
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols  = Math.floor(canvas.width / 16);
    drops = Array(cols).fill(1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(5,10,6,0.042)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = '13px JetBrains Mono, monospace';
    drops.forEach((y, i) => {
      const t = Math.random();
      ctx.fillStyle = t > 0.92 ? '#ffffff' : t > 0.6 ? '#00e676' : '#10b981';
      const char = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(char, i * 16, y * 16);
      if (y * 16 > canvas.height && Math.random() > 0.972) drops[i] = 0;
      drops[i]++;
    });
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 48);
})();

/* ── CONSTANTS ── */
const STORAGE_KEY = 'habitTracker2026_v3';
const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const monthDays = [31,28,31,30,31,30,31,31,30,31,30,31];

let currentMonth = 'Janeiro';
let dChart, lChart, bChart;

const tooltips = {
  "🏢":"Trabalho","📚":"Leitura","🥋":"Jiu-jítsu",
  "📊":"Doutorado","🚌":"Ônibus","🍔":"Ifood","💊":"Suplementos"
};

const oldToNewMap = {
  "Trabalho":"🏢","Leitura":"📚","Jiujitsu":"🥋",
  "Doutorado":"📊","Onibus":"🚌","Ifood":"🍔","Suplementos":"💊"
};

const DEFAULT_DATA = {};
months.forEach(m => {
  DEFAULT_DATA[m] = [
    {name:"🏢",goal:20,days:Array(31).fill(false)},
    {name:"📚",goal:15,days:Array(31).fill(false)},
    {name:"🥋",goal:12,days:Array(31).fill(false)},
    {name:"📊",goal:15,days:Array(31).fill(false)},
    {name:"🚌",goal:20,days:Array(31).fill(false)},
    {name:"🍔",goal:4, days:Array(31).fill(false)},
    {name:"💊",goal:30,days:Array(31).fill(false)}
  ];
});

let trackerData = JSON.parse(JSON.stringify(DEFAULT_DATA));

function setStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

/* ── SAVE (Firestore) ── */
function saveData() {
  if (!window._db || !window._userId || !window._firestoreSetDoc) {
    setStatus('⚠ sem conexão');
    return;
  }
  setStatus('salvando...');
  const docRef = window._firestoreDoc(window._db, 'users', window._userId, 'data', 'tracker');
  window._firestoreSetDoc(docRef, trackerData)
    .then(() => setStatus('✓ firestore · ' + new Date().toLocaleTimeString('pt-BR')))
    .catch(err => { console.error(err); setStatus('✗ erro ao salvar'); });
}

/* ── MONTH PCTS ── */
function calcMonthPct(month) {
  const habits = trackerData[month] || [];
  if (!habits.length) return 0;
  let totalGoal = 0, totalDone = 0;
  habits.forEach(h => {
    totalGoal += parseInt(h.goal) || 0;
    totalDone += h.days.filter(Boolean).length;
  });
  if (!totalGoal) return 0;
  return Math.min(100, Math.round(totalDone / totalGoal * 100));
}

function buildMonthMenu() {
  const ul = document.getElementById('monthMenu');
  ul.innerHTML = '';
  months.forEach(m => {
    const li = document.createElement('li');
    const pct = calcMonthPct(m);
    li.innerHTML = m + (pct > 0 ? `<span class="m-pct">${pct}%</span>` : '');
    if (m === currentMonth) li.classList.add('active');
    li.addEventListener('click', () => selectMonth(m));
    ul.appendChild(li);
  });
}

/* ── TODAY ── */
const today = new Date();
const todayMonthIdx = today.getMonth();
const todayDay = today.getDate();

function isCurrentMonthView() {
  return months.indexOf(currentMonth) === todayMonthIdx;
}

/* ── TABLE HEADER ── */
function buildTableHeader() {
  const mIdx  = months.indexOf(currentMonth);
  const nDays = monthDays[mIdx];

  document.getElementById('tableTitle').textContent =
    `// ${currentMonth.toLowerCase()} · 2026`;

  const weeksRow = document.getElementById('weeksRow');
  weeksRow.innerHTML = '';
  const addTh = (cls, label, colspan) => {
    const th = document.createElement('th');
    th.className = cls; th.textContent = label;
    if (colspan) th.colSpan = colspan;
    weeksRow.appendChild(th);
  };
  addTh('header-habit','',1);
  addTh('w1-h weeks-row','S1',Math.min(7,nDays));
  if (nDays > 7)  addTh('w2-h weeks-row','S2',Math.min(7,nDays-7));
  if (nDays > 14) addTh('w3-h weeks-row','S3',Math.min(7,nDays-14));
  if (nDays > 21) addTh('w4-h weeks-row','S4',Math.min(7,nDays-21));
  if (nDays > 28) addTh('w5-h weeks-row','S5',nDays-28);
  addTh('header-streak','',1);
  addTh('header-done',  '',1);
  addTh('header-goal',  '',1);

  const datesRow = document.getElementById('datesRow');
  datesRow.innerHTML = '';
  const addDate = (cls, txt, isToday) => {
    const th = document.createElement('th');
    th.textContent = txt;
    th.className = cls + (isToday ? ' today-col' : '');
    datesRow.appendChild(th);
  };
  addDate('header-habit','');
  for (let i = 1; i <= nDays; i++) {
    const wc = i<=7?'w1':i<=14?'w2':i<=21?'w3':i<=28?'w4':'w5';
    const isTdy = isCurrentMonthView() && i === todayDay;
    addDate(wc, i, isTdy);
  }
  for (let i = nDays+1; i <= 31; i++) {
    const th = document.createElement('th');
    th.textContent = '';
    th.style.opacity = '0';
    th.style.minWidth = '30px';
    datesRow.appendChild(th);
  }
  addDate('header-streak','🔥');
  addDate('header-done',  '✓');
  addDate('header-goal',  'meta');
}

/* ── STREAK ── */
function calcStreak(days) {
  const mIdx = months.indexOf(currentMonth);
  const nDays = monthDays[mIdx];
  const isCurrent = isCurrentMonthView();
  const startFrom = isCurrent ? todayDay - 1 : nDays - 1;
  let streak = 0;
  for (let i = startFrom; i >= 0; i--) {
    if (days[i]) streak++;
    else break;
  }
  return streak;
}

/* ── RENDER ── */
function renderHabits() {
  buildTableHeader();

  const mIdx  = months.indexOf(currentMonth);
  const nDays = monthDays[mIdx];
  const tbody = document.getElementById('habitBody');
  tbody.innerHTML = '';

  const habits = trackerData[currentMonth];

  habits.forEach((habit) => {
    const tr = document.createElement('tr');

    const tdName = document.createElement('td');
    tdName.className = 'habit-col';
    tdName.contentEditable = 'true';
    tdName.innerText = habit.name;
    tdName.title = tooltips[habit.name] || habit.name;
    tdName.addEventListener('input', () => {
      habit.name = tdName.innerText.trim();
      tdName.title = tooltips[habit.name] || habit.name;
      saveData(); updateCharts(); buildMonthMenu();
    });
    tr.appendChild(tdName);

    for (let i = 0; i < 31; i++) {
      const td = document.createElement('td');
      const dayNum = i + 1;

      if (dayNum <= nDays) {
        const wc = dayNum<=7?'w1':dayNum<=14?'w2':dayNum<=21?'w3':dayNum<=28?'w4':'w5';
        td.className = wc;
        if (isCurrentMonthView() && dayNum === todayDay) td.classList.add('today-col');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = habit.days[i];
        cb.addEventListener('change', () => {
          habit.days[i] = cb.checked;
          saveData(); updateCharts(); buildMonthMenu();
          const streakTd = tr.querySelector('.streak-col');
          const s = calcStreak(habit.days);
          streakTd.innerHTML = `<div class="streak-val"><span class="streak-num">${s}</span><span class="streak-label">streak</span></div>`;
          const doneTd = tr.querySelector('.done-col');
          const done = habit.days.slice(0, nDays).filter(Boolean).length;
          doneTd.innerHTML = `<div class="done-val"><span class="done-num">${done}</span><span class="done-lbl">feito</span></div>`;
        });
        td.appendChild(cb);
      } else {
        td.style.opacity = '0'; td.style.pointerEvents = 'none';
      }
      tr.appendChild(td);
    }

    const tdStreak = document.createElement('td');
    tdStreak.className = 'streak-col';
    const streak = calcStreak(habit.days);
    tdStreak.innerHTML = `<div class="streak-val"><span class="streak-num">${streak}</span><span class="streak-label">streak</span></div>`;
    tr.appendChild(tdStreak);

    const tdDone = document.createElement('td');
    tdDone.className = 'done-col';
    const done = habit.days.slice(0, nDays).filter(Boolean).length;
    tdDone.innerHTML = `<div class="done-val"><span class="done-num">${done}</span><span class="done-lbl">feito</span></div>`;
    tr.appendChild(tdDone);

    const tdGoal = document.createElement('td');
    tdGoal.className = 'goal-col';
    tdGoal.contentEditable = 'true';
    tdGoal.innerText = habit.goal;
    tdGoal.addEventListener('blur', e => {
      habit.goal = parseInt(e.target.innerText) || 0;
      saveData(); updateCharts(); buildMonthMenu();
    });
    tdGoal.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); tdGoal.blur(); }
    });
    tr.appendChild(tdGoal);

    tbody.appendChild(tr);
  });

  updateCharts();
}

/* ── CHARTS ── */
Chart.defaults.color = 'rgba(150,200,150,0.55)';
Chart.defaults.borderColor = 'rgba(0,230,118,0.05)';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.font.size = 10;

function updateCharts() {
  const mIdx  = months.indexOf(currentMonth);
  const nDays = monthDays[mIdx];
  const habits = trackerData[currentMonth];

  const labels    = habits.map(h => tooltips[h.name] || h.name);
  const dataPercent = habits.map(h => {
    const done = h.days.filter(Boolean).length;
    const goal = parseInt(h.goal) || 1;
    return Math.min(100, Math.round(done / goal * 100));
  });

  const dataLine = Array(nDays).fill(0);
  habits.forEach(h => {
    h.days.slice(0, nDays).forEach((v, i) => { if (v) dataLine[i]++; });
  });

  const base = { responsive: true, maintainAspectRatio: false };

  const ctxD = document.getElementById('doughnutChart').getContext('2d');
  if (dChart) dChart.destroy();
  const total = dataPercent.reduce((a,b)=>a+b,0);
  const donutColors = ['#00e676','#ff4757','#ffa502','#1e90ff','#7B61FF','#10b981','#ff6b81'];
  dChart = new Chart(ctxD, {
    type: 'doughnut',
    data: {
      labels: total===0 ? ['Sem dados'] : labels,
      datasets: [{
        data: total===0 ? [1] : dataPercent,
        backgroundColor: total===0 ? ['rgba(0,230,118,0.08)'] : donutColors,
        borderWidth: 2, borderColor: '#070e08', hoverOffset: 5
      }]
    },
    options: { ...base, cutout: '66%',
      plugins: { legend: { position:'bottom', labels:{ boxWidth:8, padding:10, font:{size:9} } } }
    }
  });

  const ctxL = document.getElementById('lineChart').getContext('2d');
  if (lChart) lChart.destroy();
  lChart = new Chart(ctxL, {
    type: 'line',
    data: {
      labels: Array.from({length: nDays}, (_,i) => i+1),
      datasets: [{
        label: 'Hábitos concluídos',
        data: dataLine,
        borderColor: '#00e676',
        backgroundColor: 'rgba(0,230,118,0.07)',
        borderWidth: 2, fill: true, tension: 0.4,
        pointBackgroundColor: '#070e08',
        pointBorderColor: '#00e676',
        pointRadius: 3
      }]
    },
    options: { ...base,
      scales: {
        y: { beginAtZero:true, max: habits.length, ticks:{ stepSize:1 }, grid:{ color:'rgba(0,230,118,0.05)' } },
        x: { grid:{ display:false } }
      },
      plugins: { legend:{ display:false } }
    }
  });

  const ctxB = document.getElementById('barChart').getContext('2d');
  if (bChart) bChart.destroy();
  bChart = new Chart(ctxB, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '% Meta',
        data: dataPercent,
        backgroundColor: dataPercent.map(v =>
          v >= 100 ? '#00e676' : v >= 60 ? '#10b981' : v >= 30 ? '#ffa502' : '#ff4757'
        ),
        borderRadius: 3
      }]
    },
    options: { ...base, indexAxis: 'y',
      scales: {
        x: { beginAtZero:true, max:100, grid:{ color:'rgba(0,230,118,0.05)' } },
        y: { grid:{ display:false }, ticks:{ font:{ size:9 } } }
      },
      plugins: { legend:{ display:false } }
    }
  });
}

/* ── EXPORT / IMPORT ── */
function abrirModalExportacao() {
  const ta = document.getElementById('exportTextarea');
  ta.value = JSON.stringify(trackerData, null, 2);
  document.getElementById('exportModal').style.display = 'flex';
  setTimeout(() => { ta.focus(); ta.select(); }, 100);
}
function fecharModalExport() {
  document.getElementById('exportModal').style.display = 'none';
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported && imported['Janeiro']) {
        trackerData = imported;
        saveData(); buildMonthMenu(); renderHabits();
        setStatus('backup carregado ✓');
      }
    } catch(err) {}
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* ── NAVIGATION ── */
function selectMonth(name) {
  currentMonth = name;
  document.getElementById('pageTitle').textContent = name;
  document.querySelectorAll('.month-list li').forEach(li => {
    li.classList.toggle('active', li.textContent.startsWith(name));
  });
  const w = document.getElementById('dashWrapper');
  w.classList.remove('fade-in');
  void w.offsetWidth;
  w.classList.add('fade-in');
  renderHabits();
}

/* ── INIT ── */
window.onload = () => {
  buildMonthMenu();
  renderHabits();
};
</script>
